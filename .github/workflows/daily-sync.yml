name: Daily DART Sync

on:
  push:
    paths:
      - ".github/workflows/daily-sync.yml"
  schedule:
    - cron: "0 0 * * *"   # 매일 09:00 KST (UTC 00:00)
    - cron: "0 9 * * *"   # 매일 18:00 KST (UTC 09:00)
  workflow_dispatch:       # 수동 실행도 가능

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx prisma generate
      - name: Debug env
        run: |
          echo "DATABASE_URL length: ${#DATABASE_URL}"
          echo "DART_API_KEY length: ${#DART_API_KEY}"
      - name: Run daily sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: npx tsx scripts/daily-sync.ts
      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/ Dart_Data/
          git diff --staged --quiet || git commit -m "chore: daily DART sync [auto]"
          git push
