name: Person Search Scraper

on:
  workflow_dispatch:
    inputs:
      name: { description: "검색할 인물명", required: true }
      period: { description: "검색 기간(개월)", required: false, default: "12" }

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Install Chromium
        run: npx puppeteer browsers install chrome

      - name: Scrape DART
        run: node scripts/scrape-person.js "${{ inputs.name }}" "${{ inputs.period }}"
        env:
          DATABASE_URL: ${{ vars.DATABASE_URL }}
          DART_API_KEY: ${{ vars.DART_API_KEY }}

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Dart_Data/person-results/
          if git diff --staged --quiet; then
            echo "변경 없음"
          else
            git commit -m "chore: person scrape ${{ inputs.name }}"
            git pull --rebase origin main || true
            git push origin main
          fi
