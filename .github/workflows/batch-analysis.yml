name: Batch Analysis

on:
  schedule:
    - cron: "0 21 * * *"   # KST 06:00 (UTC 21:00 전날)
    - cron: "0 6 * * *"    # KST 15:00 (UTC 06:00)
    - cron: "0 12 * * *"   # KST 21:00 (UTC 12:00)
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          echo "=== npm install ==="
          npm install
          echo "=== prisma generate ==="
          npx prisma generate
          echo "=== versions ==="
          node --version
          npx tsx --version || true

      - name: Check env vars
        run: |
          DB="${{ vars.DATABASE_URL }}"
          echo "DATABASE_URL length: ${#DB}"
          # 비밀번호 마스킹 후 호스트만 출력
          echo "DATABASE_URL host: $(echo "$DB" | sed 's|.*@||' | sed 's|/.*||')"
          echo "DART_API_KEY set: ${{ vars.DART_API_KEY != '' }}"
          echo "DEEPSEEK_API_KEY set: ${{ vars.DEEPSEEK_API_KEY != '' }}"
          # TCP 연결 가능 여부 테스트
          HOST=$(echo "$DB" | sed 's|.*@||' | sed 's|/.*||' | sed 's|:.*||')
          echo "Testing TCP to $HOST:5432 ..."
          timeout 10 bash -c "cat < /dev/null > /dev/tcp/$HOST/5432" && echo "TCP OK" || echo "TCP FAILED"

      - name: Process batch jobs
        run: npx tsx scripts/process-batch.ts
        env:
          DATABASE_URL: ${{ vars.DATABASE_URL }}
          DART_API_KEY: ${{ vars.DART_API_KEY }}
          DEEPSEEK_API_KEY: ${{ vars.DEEPSEEK_API_KEY }}

      - name: Commit report files
        run: |
          git config user.name "cassandra-bot"
          git config user.email "cassandra-bot@users.noreply.github.com"
          git add Dart_Data/reports/
          if git diff --staged --quiet; then
            echo "변경 없음 — 처리할 배치 작업이 없었거나 DB에 데이터 없음"
          else
            git commit -m "chore: batch report $(date -u '+%Y-%m-%d %H:%M') UTC"
            git pull --rebase origin main || true
            git push origin main
          fi
